$wall = /home/mohireza/Downloads/wallpapers/wallhaven-lqqve2_2560x1440.png
# $wall = $HOME/.config/hyprlock/wallpapers/hyprlock.png
$source = Droid Sans
# source = $HOME/.config/hyprlock/fonts/SF Pro Display Bold
# BACKGROUND
background {
    monitor =
    path = $wall
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8916
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Profie-Photo
image {
    monitor =
    path = /home/mohireza/.config/hypr/vivek.png
    border_size = 2
    border_color = $primary_3_rgba 
    size = 100
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 25, 100
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = rgba(216, 222, 233, 0.80)
    font_size = 50
    font_family = $source
    position = 30, -30
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, .80)
    font_size = 16
    font_family = $source
    position = 35, -100
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 500, 500
    color = rgba(0, 0, 0, 0.7)
    rounding = 15
    blur_passes = 1
    blur_size=3
    border_size = 0
    border_color = $primary_8_rgba 
    rotate = 0
    xray = false 
    position = 34, -70
    halign = center
    valign = center
    opacity = 0.9
}

